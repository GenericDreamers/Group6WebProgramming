<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khoa Subjects</title>
</head>
<body>
    <h2>Môn học của khoa {{ khoa_name }}</h2>
    <ul>
    {% for s in subjects %}
    <li>
        {{ s.Ten }}
        <a href="{{ url_for('edit_lecturers', khoa_id=khoa_id, subject_id=s.ID) }}">Sửa giảng viên</a>
    </li>
    {% endfor %}
    </ul>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</body>
</html>
